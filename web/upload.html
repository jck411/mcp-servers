<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Knowledge Upload</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #1f232c;
    --border: #2a2f3a;
    --text: #e7e9ee;
    --muted: #8b93a4;
    --accent: #4f8cff;
    --ok: #3fb978;
    --warn: #d8a32d;
    --err: #e85d6b;
    --info: #5fa8ff;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.5 system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  main { max-width: 880px; margin: 0 auto; padding: 24px 16px 48px; }
  h1 { font-size: 18px; font-weight: 600; margin: 0 0 16px; }
  h1 small { color: var(--muted); font-weight: 400; margin-left: 8px; }
  .card { background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  label { display: block; font-size: 12px; color: var(--muted);
    margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
  input, select, button {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 8px 10px; font-size: 14px; font-family: inherit;
  }
  input[type=password], input[type=text], select { width: 100%; }
  button { cursor: pointer; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.primary:hover { filter: brightness(1.1); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .row { display: flex; gap: 12px; align-items: flex-end; }
  .row > * { flex: 1; }
  .row > .small { flex: 0 0 auto; }
  .checks { display: flex; gap: 16px; margin-top: 8px; color: var(--muted); }
  .checks label { display: inline-flex; align-items: center; gap: 6px;
    text-transform: none; letter-spacing: 0; font-size: 13px; color: var(--muted); margin: 0; }
  .checks input { width: auto; }

  #drop {
    border: 2px dashed var(--border); border-radius: 8px;
    padding: 36px 16px; text-align: center; color: var(--muted);
    transition: background 0.15s, border-color 0.15s;
  }
  #drop.hover { background: var(--panel-2); border-color: var(--accent); color: var(--text); }
  #drop strong { color: var(--text); }
  #file { display: none; }
  #pick { color: var(--accent); text-decoration: underline; cursor: pointer; }

  #results { display: flex; flex-direction: column; gap: 8px; }
  .result {
    background: var(--panel-2); border: 1px solid var(--border);
    border-left-width: 4px; border-radius: 6px; padding: 12px;
    display: grid; grid-template-columns: 1fr auto; gap: 4px 16px;
    font-size: 13px;
  }
  .result.ok { border-left-color: var(--ok); }
  .result.info { border-left-color: var(--info); }
  .result.warn { border-left-color: var(--warn); }
  .result.err { border-left-color: var(--err); }
  .result .name { font-weight: 600; color: var(--text); word-break: break-all; }
  .result .meta { color: var(--muted); font-size: 12px; }
  .result code { font-family: ui-monospace, "SF Mono", Menlo, monospace;
    background: var(--bg); padding: 1px 6px; border-radius: 3px; }
  .result button.copy { background: var(--bg); border: 1px solid var(--border);
    color: var(--muted); padding: 4px 8px; font-size: 12px; }
  .result button.copy:hover { color: var(--text); border-color: var(--accent); }
  .result .badge { display: inline-block; padding: 2px 6px; border-radius: 3px;
    font-size: 11px; font-weight: 600; margin-right: 6px; }
  .badge.ok { background: rgba(63,185,120,0.15); color: var(--ok); }
  .badge.info { background: rgba(95,168,255,0.15); color: var(--info); }
  .badge.warn { background: rgba(216,163,45,0.15); color: var(--warn); }
  .badge.err { background: rgba(232,93,107,0.15); color: var(--err); }

  .top { display: flex; justify-content: space-between; align-items: center; }

  /* Pipeline log toggle */
  .pipeline-toggle { font-size: 11px; color: var(--accent); cursor: pointer;
    border: none; background: none; padding: 2px 0; margin-top: 4px; }
  .pipeline-toggle:hover { text-decoration: underline; }
  .pipeline-log { display: none; margin-top: 8px; border-top: 1px solid var(--border);
    padding-top: 8px; }
  .pipeline-log.open { display: block; }
  .pipeline-step { display: flex; gap: 8px; align-items: baseline;
    font-size: 12px; padding: 2px 0; }
  .step-icon { width: 14px; text-align: center; flex-shrink: 0; }
  .step-body { flex: 1; color: var(--muted); }
  .step-body strong { color: var(--text); }
  .step-model { color: var(--muted); font-size: 11px; font-style: italic; }
  .step-tokens { color: var(--muted); font-size: 11px; }

  /* Extract Facts button */
  button.extract { background: var(--panel); border: 1px solid var(--border);
    color: var(--text); padding: 5px 10px; font-size: 12px; margin-top: 6px;
    border-radius: 5px; cursor: pointer; }
  button.extract:hover { border-color: var(--accent); color: var(--accent); }
  button.extract:disabled { opacity: 0.5; cursor: not-allowed; }
  button.extract.running { opacity: 0.6; }

  /* Remove (delete source) button */
  button.remove { background: var(--panel); border: 1px solid var(--border);
    color: var(--muted); padding: 5px 10px; font-size: 12px; margin-top: 6px;
    border-radius: 5px; cursor: pointer; }
  button.remove:hover { border-color: var(--err); color: var(--err); }
  button.remove:disabled { opacity: 0.5; cursor: not-allowed; }
  .card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
</style>
</head>
<body>
<main>
  <div class="top">
    <h1>Knowledge Upload <small>api-knowledge.jackshome.com</small></h1>
  </div>

  <section id="uploader">
    <div class="card">
      <div class="row">
        <div>
          <label for="domain">Domain</label>
          <select id="domain"></select>
        </div>
        <div class="small">
          <label>&nbsp;</label>
          <button id="refresh-domains" title="Reload domain list">↻</button>
        </div>
      </div>
      <div class="checks">
        <label><input type="checkbox" id="overwrite" /> overwrite (replace file with same name)</label>
        <label><input type="checkbox" id="force" /> force (re-extract / re-embed)</label>
      </div>
    </div>

    <div class="card" id="drop">
      <div>Drop files here or <span id="pick">choose files</span></div>
      <div style="margin-top: 6px; font-size: 12px;">PDF, image, docx, txt, anything. Multiple files OK.</div>
      <input id="file" type="file" multiple />
    </div>

    <div id="results"></div>
  </section>
</main>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  // ---------- domains ----------
  async function loadDomains() {
    const sel = $("domain");
    sel.innerHTML = "<option>loading…</option>";
    try {
      const r = await fetch("/api/domains");
      const j = await r.json();
      const names = (j.domains || [])
        .filter((d) => !d.archived)
        .map((d) => d.name)
        .sort();
      const last = localStorage.getItem("knowledge_last_domain");
      sel.innerHTML = names
        .map((n) => `<option value="${n}"${n === last ? " selected" : ""}>${n}</option>`)
        .join("");
    } catch (e) {
      sel.innerHTML = "<option>error loading</option>";
    }
  }
  $("refresh-domains").onclick = loadDomains;
  $("domain").onchange = () =>
    localStorage.setItem("knowledge_last_domain", $("domain").value);

  // ---------- drag-drop ----------
  const drop = $("drop");
  $("pick").onclick = () => $("file").click();
  $("file").onchange = (e) => handleFiles(e.target.files);
  ["dragenter", "dragover"].forEach((ev) =>
    drop.addEventListener(ev, (e) => {
      e.preventDefault();
      drop.classList.add("hover");
    })
  );
  ["dragleave", "drop"].forEach((ev) =>
    drop.addEventListener(ev, (e) => {
      e.preventDefault();
      drop.classList.remove("hover");
    })
  );
  drop.addEventListener("drop", (e) => {
    if (e.dataTransfer && e.dataTransfer.files) handleFiles(e.dataTransfer.files);
  });

  // ---------- helpers ----------
  function nested(obj, keys) {
    let cur = obj;
    for (const key of keys) {
      if (!cur || typeof cur !== "object") return "";
      cur = cur[key];
    }
    return cur || "";
  }

  function sourceIdFrom(json) {
    return (
      nested(json, ["source_id"]) ||
      nested(json, ["id"]) ||
      nested(json, ["source", "id"]) ||
      nested(json, ["source", "source_id"]) ||
      nested(json, ["detail", "source_id"]) ||
      nested(json, ["detail", "id"]) ||
      nested(json, ["detail", "source", "id"]) ||
      nested(json, ["detail", "source", "source_id"])
    );
  }

  function storedPathFrom(json) {
    return (
      nested(json, ["stored_path"]) ||
      nested(json, ["source", "stored_path"]) ||
      nested(json, ["detail", "stored_path"]) ||
      nested(json, ["detail", "source", "stored_path"])
    );
  }

  function messageFrom(json, fallback) {
    const detail = json && json.detail;
    if (typeof detail === "string") return detail;
    return (
      nested(json, ["message"]) ||
      nested(json, ["reason"]) ||
      nested(json, ["error"]) ||
      nested(json, ["detail", "message"]) ||
      nested(json, ["detail", "reason"]) ||
      nested(json, ["detail", "error"]) ||
      fallback
    );
  }

  function escapeHtml(value) {
    return String(value || "").replace(/[&<>"']/g, (ch) => ({
      "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
    }[ch]));
  }

  // ---------- pipeline log renderer ----------
  const STEP_ICONS = {
    ok: "✓", failed: "✗", skipped: "·", warn: "⚠", running: "…",
  };
  const STEP_COLORS = {
    ok: "var(--ok)", failed: "var(--err)", skipped: "var(--muted)",
    warn: "var(--warn)", running: "var(--info)",
  };

  function renderPipelineLog(steps) {
    if (!steps || !steps.length) return "";
    const rows = steps.map((s) => {
      const icon = STEP_ICONS[s.status] || "?";
      const color = STEP_COLORS[s.status] || "var(--muted)";
      const modelPart = s.model ? `<span class="step-model">${escapeHtml(s.model)}</span> ` : "";
      const tokenPart = (s.tokens_in || s.tokens_out)
        ? `<span class="step-tokens"> · ${s.tokens_in}in/${s.tokens_out}out tok${s.cache_read_tokens ? ` · ${s.cache_read_tokens} cached` : ""}</span>`
        : "";
      const pagePart = s.page ? `<span class="step-tokens"> [${escapeHtml(s.page)}]</span>` : "";
      return `<div class="pipeline-step">
        <span class="step-icon" style="color:${color}">${icon}</span>
        <span class="step-body">${modelPart}<strong>${escapeHtml(s.step)}</strong>${pagePart} — ${escapeHtml(s.note || "")}${tokenPart}</span>
      </div>`;
    }).join("");
    return `<div class="pipeline-log">${rows}</div>`;
  }

  // ---------- classify upload result ----------
  function classify(json, status) {
    if (status === 409) return {
      kind: "warn", badge: "EXISTS",
      msg: messageFrom(json, "Filename already on disk. Tick overwrite to replace."),
    };
    if (!json || json.success === false) return {
      kind: "err", badge: "ERROR", msg: messageFrom(json, "upload failed"),
    };
    const chunks = json.chunks_stored || 0;
    const ptype = json.pipeline_type || "";
    const needsExtract = json.needs_extraction === true;

    if (json.ingested === true && chunks > 0 && ptype === "image_description")
      return { kind: "ok", badge: "DESCRIBED", msg: `image described · ${chunks} chunk` };
    if (json.ingested === true && chunks > 0)
      return {
        kind: needsExtract ? "warn" : "ok",
        badge: needsExtract ? "INDEXED·REVIEW" : "INDEXED",
        msg: `${chunks} chunk(s) indexed${needsExtract ? " · low confidence — review recommended" : ""}`,
      };
    if (json.ingested === true && chunks === 0)
      return {
        kind: ptype === "image_description" ? "warn" : "info",
        badge: ptype === "image_description" ? "STORED·NO DESC" : "STORED",
        msg: json.reason || "bytes saved, no text extracted",
      };
    if (json.ingested === false && /backfilled/i.test(json.reason || ""))
      return { kind: "info", badge: "BACKFILLED", msg: "attached bytes to existing source" };
    if (json.ingested === false && /already ingested/i.test(json.reason || ""))
      return { kind: "info", badge: "DUPLICATE", msg: "exact duplicate" };
    return { kind: "info", badge: "OK", msg: json.reason || "done" };
  }

  // ---------- render upload result ----------
  function render(file, domain, classified, json) {
    const sid = sourceIdFrom(json);
    const path = storedPathFrom(json);
    const ptype = json.pipeline_type || "";
    const chunks = json.chunks_stored || 0;
    const canExtract = !!sid;

    const div = document.createElement("div");
    div.className = "result " + classified.kind;

    const pipelineHtml = renderPipelineLog(json.pipeline || []);
    const hasPipeline = !!(json.pipeline && json.pipeline.length);

    div.innerHTML = `
      <div>
        <div class="name">
          <span class="badge ${classified.kind}">${escapeHtml(classified.badge)}</span>
          ${escapeHtml(file.name)} <span class="meta">→ ${escapeHtml(domain)}</span>
        </div>
        <div class="meta">${escapeHtml(classified.msg)}</div>
        ${sid ? `<div class="meta">source_id: <code>${escapeHtml(sid)}</code>${path ? ` · ${escapeHtml(path)}` : ""}</div>` : ""}
        ${ptype ? `<div class="meta" style="color:var(--muted);font-size:11px;">pipeline: ${escapeHtml(ptype)}</div>` : ""}
        ${hasPipeline ? `<button class="pipeline-toggle">▶ show pipeline log (${(json.pipeline||[]).length} steps)</button>` : ""}
        ${pipelineHtml}
        <div class="card-actions">
          ${canExtract ? `<button class="extract" data-sid="${escapeHtml(sid)}" data-name="${escapeHtml(file.name)}">⚡ Extract Facts</button>` : ""}
          ${canExtract ? `<button class="remove" data-sid="${escapeHtml(sid)}">🗑 Remove</button>` : ""}
        </div>
      </div>
      <div>${sid ? `<button class="copy" data-sid="${escapeHtml(sid)}">copy id</button>` : ""}</div>`;

    // copy id
    const copyBtn = div.querySelector("button.copy");
    if (copyBtn) copyBtn.onclick = () => {
      navigator.clipboard.writeText(copyBtn.dataset.sid);
      copyBtn.textContent = "copied";
      setTimeout(() => (copyBtn.textContent = "copy id"), 1200);
    };

    // pipeline toggle
    const toggle = div.querySelector(".pipeline-toggle");
    const log = div.querySelector(".pipeline-log");
    if (toggle && log) toggle.onclick = () => {
      log.classList.toggle("open");
      toggle.textContent = log.classList.contains("open")
        ? `▼ hide pipeline log (${(json.pipeline||[]).length} steps)`
        : `▶ show pipeline log (${(json.pipeline||[]).length} steps)`;
    };

    // Extract Facts
    const extBtn = div.querySelector("button.extract");
    if (extBtn) extBtn.onclick = () => runExtract(extBtn, div, sid, file.name);

    // Remove source
    const removeBtn = div.querySelector("button.remove");
    if (removeBtn) removeBtn.onclick = () => runRemove(removeBtn, div, sid);

    $("results").prepend(div);
  }

  // ---------- Remove source ----------
  async function runRemove(btn, card, sid) {
    if (!confirm(`Delete source ${sid} and its file?\n\nThis cannot be undone.`)) return;
    btn.disabled = true;
    btn.textContent = "🗑 Removing…";
    try {
      const r = await fetch(`/api/sources/${encodeURIComponent(sid)}`, { method: "DELETE" });
      const j = await r.json().catch(() => ({}));
      if (r.ok && j.success) {
        card.style.opacity = "0.4";
        card.style.transition = "opacity 0.3s";
        setTimeout(() => card.remove(), 350);
      } else {
        const msg = j.error || j.detail || `HTTP ${r.status}`;
        btn.textContent = `✗ ${msg}`;
        btn.style.color = "var(--err)";
        btn.disabled = false;
      }
    } catch (e) {
      btn.textContent = `✗ network error`;
      btn.style.color = "var(--err)";
      btn.disabled = false;
    }
  }

  // ---------- Extract Facts ----------
  async function runExtract(btn, card, sid, filename) {
    btn.disabled = true;
    btn.classList.add("running");
    btn.textContent = "⚡ Extracting…";

    // Inject a live "running" pipeline step
    let liveLog = card.querySelector(".pipeline-log");
    if (!liveLog) {
      liveLog = document.createElement("div");
      liveLog.className = "pipeline-log open";
      btn.before(liveLog);
    }
    liveLog.classList.add("open");
    const runningRow = document.createElement("div");
    runningRow.className = "pipeline-step";
    runningRow.innerHTML = `<span class="step-icon" style="color:var(--info)">…</span><span class="step-body"><strong>extraction_llm</strong> — calling model…</span>`;
    liveLog.appendChild(runningRow);

    try {
      const r = await fetch(`/api/sources/${encodeURIComponent(sid)}/extract`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });
      const j = await r.json().catch(() => ({}));

      // Re-render pipeline log with full results
      liveLog.innerHTML = "";
      const steps = j.pipeline || (j.detail && j.detail.pipeline) || [];
      const logHtml = renderPipelineLog(steps);
      liveLog.innerHTML = logHtml
        ? logHtml.replace(/^<div class="pipeline-log">/, "").replace(/<\/div>$/, "")
        : "";

      if (j.success) {
        btn.textContent = `✓ ${j.facts_written} fact(s) extracted`;
        btn.style.color = "var(--ok)";
        btn.style.borderColor = "var(--ok)";
        if (j.caption) {
          const cap = document.createElement("div");
          cap.className = "meta";
          cap.style.marginTop = "4px";
          cap.textContent = `Caption: "${j.caption}"`;
          btn.after(cap);
        }
      } else {
        // j.detail may be a string (route-level 404) or an object (app-level error)
        const detail = j.detail;
        const errMsg = j.error
          || (detail && typeof detail === "object" && (detail.error || detail.message))
          || (typeof detail === "string" ? detail : null)
          || "extraction failed";
        btn.textContent = `✗ ${errMsg}`;
        btn.style.color = "var(--err)";
        btn.style.borderColor = "var(--err)";
        btn.disabled = false;
        btn.classList.remove("running");
      }
    } catch (e) {
      runningRow.innerHTML = `<span class="step-icon" style="color:var(--err)">✗</span><span class="step-body">network error: ${escapeHtml(String(e))}</span>`;
      btn.textContent = "⚡ Extract Facts";
      btn.disabled = false;
      btn.classList.remove("running");
    }
  }

  // ---------- pending placeholder ----------
  function pending(file, domain) {
    const div = document.createElement("div");
    div.className = "result info";
    div.innerHTML = `
      <div>
        <div class="name"><span class="badge info">UPLOADING</span> ${escapeHtml(file.name)}
          <span class="meta">→ ${escapeHtml(domain)}</span></div>
        <div class="meta">${(file.size/1024).toFixed(0)} KB</div>
      </div><div></div>`;
    $("results").prepend(div);
    return div;
  }

  // ---------- upload ----------
  async function handleFiles(fileList) {
    const domain = $("domain").value;
    const overwrite = $("overwrite").checked;
    const force = $("force").checked;
    if (!domain) return;

    for (const file of fileList) {
      const placeholder = pending(file, domain);
      try {
        const fd = new FormData();
        fd.append("file", file, file.name);
        const qs = new URLSearchParams();
        if (overwrite) qs.set("overwrite", "true");
        if (force) qs.set("force", "true");
        const url = `/api/upload/${encodeURIComponent(domain)}${qs.toString() ? "?" + qs : ""}`;
        const r = await fetch(url, { method: "POST", body: fd });
        let j = {};
        let parseOk = false;
        try { j = await r.json(); parseOk = true; } catch (_) {}
        // Non-JSON body (e.g. 500 plain-text) — treat as error
        if (!parseOk && !r.ok) {
          j = { success: false, error: `HTTP ${r.status} — server returned non-JSON response` };
        }
        const cls = classify(j, r.status);
        placeholder.remove();
        render(file, domain, cls, j);
      } catch (e) {
        placeholder.remove();
        render(file, domain, { kind: "err", badge: "ERROR", msg: String(e) }, {});
      }
    }
    $("file").value = "";
  }

  loadDomains();
})();
</script>
</body>
</html>
